<section class="section section--light" id="contacto">
    <div class="container">
        <div class="grid grid-2 gap-lg">
            <div class="contact-info">
                <h2>¿Listo para Transformar tu Empresa?</h2>
                <p>Contáctanos hoy y descubre cómo podemos ayudarte.</p>
                <div class="contact-details">
                    <div class="contact-item">
                        <div class="contact-icon icon icon--md icon--primary">📍</div>
                        <div>
                            <h4>Ubicación</h4>
                            <p class="text-muted">Chile</p>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon icon icon--md icon--primary">📧</div>
                        <div>
                            <h4>Email</h4>
                            <p class="text-muted">contacto@adumawe.cl</p>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon icon icon--md icon--primary">📞</div>
                        <div>
                            <h4>Teléfono</h4>
                            <p class="text-muted">+56 9 XXXX XXXX</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="contact-form">
                <h3>Solicita una Cotización</h3>
                <form id="contactForm">
                    <div class="form-group">
                        <label for="name">Nombre Completo</label>
                        <input type="text" id="name" name="name" class="form-control" placeholder="Tu nombre" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="tu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="company">Empresa</label>
                        <input type="text" id="company" name="company" class="form-control" placeholder="Nombre de tu empresa">
                    </div>
                    <div class="form-group">
                        <label for="course">Curso de Interés</label>
                        <select id="course" name="course" class="form-control">
                            <option value="">Selecciona un curso</option>
                            <option>Área Office</option>
                            <option>Área Bodega</option>
                            <option>Psicología Laboral</option>
                            <option>Área Salud</option>
                            <option>Habilidades Transversales</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="message">Mensaje</label>
                        <textarea id="message" name="message" class="form-control form-control--textarea" placeholder="¿En qué podemos ayudarte?"></textarea>
                    </div>
                    <button type="submit" class="btn btn--primary" style="width: 100%;">Enviar Solicitud</button>
                </form>
            </div>
        </div>
    </div>
</section>
