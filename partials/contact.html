<section class="section section--light" id="contacto" role="region" aria-labelledby="contacto-heading">
    <div class="container">
        <div class="grid grid-2 gap-lg">
            <div class="contact-info">
                <h2 id="contacto-heading">¿Listo para Transformar tu Empresa?</h2>
                <p>Contáctanos hoy y descubre cómo podemos ayudarte.</p>
                <div class="contact-details">
                    <div class="contact-item">
                        <div class="contact-icon icon icon--md">
                            <svg xmlns="http://www.w3.org/2000/svg" class="icon-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </div>
                        <div>
                            <h4>Ubicación</h4>
                            <p class="text-muted">Chile</p>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon icon icon--md">
                            <svg xmlns="http://www.w3.org/2000/svg" class="icon-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <div>
                            <h4>Email</h4>
                            <p class="text-muted">contacto@adumawe.cl</p>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon icon icon--md">
                            <svg xmlns="http://www.w3.org/2000/svg" class="icon-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                            </svg>
                        </div>
                        <div>
                            <h4>Teléfono</h4>
                            <p class="text-muted">+56 9 XXXX XXXX</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="contact-form">
                <h3>Solicita una Cotización</h3>
                <form id="contactForm" novalidate>
                    <div class="form-group">
                        <label for="name">Nombre Completo <span class="required">*</span></label>
                        <input type="text" id="name" name="name" class="form-control" placeholder="Tu nombre completo" required aria-required="true">
                    </div>
                    <div class="form-group">
                        <label for="email">Email <span class="required">*</span></label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="tu@email.com" required aria-required="true">
                    </div>
                    <div class="form-group">
                        <label for="company">Empresa</label>
                        <input type="text" id="company" name="company" class="form-control" placeholder="Nombre de tu empresa">
                    </div>
                    <div class="form-group">
                        <label for="course">Área de Interés <span class="required">*</span></label>
                        <select id="course" name="course" class="form-control" required aria-required="true">
                            <option value="">Selecciona un área</option>
                            <option>Área Office</option>
                            <option>Área Bodega</option>
                            <option>Psicología Laboral</option>
                            <option>Área Salud</option>
                            <option>Modalidades</option>
                            <option>Gestión Empresarial</option>
                            <option>Seguridad e Higiene</option>
                            <option>Desarrollo Personal</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="message">Mensaje</label>
                        <textarea id="message" name="message" class="form-control form-control--textarea" placeholder="¿En qué podemos ayudarte?" rows="4"></textarea>
                    </div>
                    <p class="form-note"><span class="required">*</span> Campos obligatorios</p>
                    <button type="submit" class="btn btn--primary" style="width: 100%;">Enviar Solicitud</button>
                </form>
            </div>
        </div>
    </div>
</section>
